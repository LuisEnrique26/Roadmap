version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: erp-postgress
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin-password
      POSTGRES_DB: erp_database
    ports:
      - "5432:5432"
    volumes: 
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data: