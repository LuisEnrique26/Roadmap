<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: rgb(94, 94, 106);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div
      class="mx-auto flex max-w-3xl overflow-hidden rounded-2xl bg-[#222222] text-white shadow-xl"
    >
      <img src="./assets/image.jpg" alt="Image" class="w-1/3 object-cover md:w-2/5" />
      <div class="flex w-full flex-col justify-center gap-6 p-8 md:p-12">
        <div class="flex flex-col gap-3">
          <h3 class="font-serif text-3xl font-bold tracking-tight">
            Get diets and fitness tips in your inbox
          </h3>
          <p class="text-gray-300 text-sm md:text-base">
            Eat better and exercise better. Sign up for the Diet & Fitness newsletter.
          </p>
        </div>
        <div class="flex flex-row gap-4">
          <input
            type="text"
            placeholder="Enter your email"
            class="flex-1 rounded-md bg-transparent px-6 py-2 text-white font-medium transition-colors hover:bg-gray-800 active:bg-gray-900 border border-gray-600 active:border-gray-800 focus:border-gray-800"
          />
          <button
            class="rounded-md bg-green-700 px-6 py-2 text-white transition-colors hover:bg-green-800 active:bg-green-900"
          >
            Subscribe
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
